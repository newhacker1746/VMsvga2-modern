# inspired from VoodooI2C workflow
name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: KEXT

jobs:
  build:
    name: Project Build
    runs-on: macos-15-intel
    env:
      JOB_TYPE: BUILD
    steps:
    - name: Checkout VMsvga2
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 500
    # shouldn't be necessary because recursive submodules includes MacKernelSDK
    # - name: Checkout MacKernelSDK
    #   uses: actions/checkout@v4
    #   with:
    #     repository: acidanthera/MacKernelSDK
    #     path: MacKernelSDK
    - name: CI Bootstrap
      run: |
        src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1

    - name: Fetch tags
      run: git fetch --tags --recurse-submodules=no

    - name: Get Commit SHA
      id: vars
      run: |
        echo "sha_short=$(git rev-parse --short=8 ${{ github.sha }})" >> $GITHUB_OUTPUT

    - name: Build Debug VMsvga2
      run: xcodebuild -project VMsvga2.xcodeproj -target All -configuration ReleaseSnowLeoDebug
    - name: Build Release VMsvga2
      run: xcodebuild -project VMsvga2.xcodeproj -target All -configuration ReleaseSnowLeo

    - name: Package Debug
      run: |
        cd build/ReleaseSnowLeoDebug
        zip -r ../../VMsvga2-modern-DEBUG-${{ steps.vars.outputs.sha_short }}.zip \
          VMsvga2.kext \
          VMsvga2.kext.dSYM \
          VMsvga2Accel.kext \
          VMsvga2Accel.kext.dSYM \
          VMsvga2GA.plugin \
          VMsvga2GA.plugin.dSYM \
          VMsvga2GLDriver.bundle \
          VMsvga2GLDriver.bundle.dSYM

    - name: Package Release
      run: |
        cd build/ReleaseSnowLeo
        zip -r ../../VMsvga2-modern-RELEASE-${{ steps.vars.outputs.sha_short }}.zip \
          VMsvga2.kext \
          VMsvga2.kext.dSYM \
          VMsvga2Accel.kext \
          VMsvga2Accel.kext.dSYM \
          VMsvga2GA.plugin \
          VMsvga2GA.plugin.dSYM \
          VMsvga2GLDriver.bundle \
          VMsvga2GLDriver.bundle.dSYM
          
     - name: Generate Release Description
       if: github.event_name == 'release'
       env:
         CURRENT_TAG: ${{ github.event.release.tag_name }}
       run: |
         set -euo pipefail

         CURRENT_COMMIT="$(git rev-list -n 1 "$CURRENT_TAG")"

         LAST_TAG="$(
           git describe \
             --tags \
             --abbrev=0 \
             "${CURRENT_COMMIT}^" \
             2>/dev/null || true
         )"

         if [[ -n "$LAST_TAG" ]]; then
           NUM_COMMITS="$(git rev-list --count "${LAST_TAG}..${CURRENT_COMMIT}")"

           LAST_TEN_COMMITS="$(
             git log \
               --pretty=format:"%h - %s (%an)" \
               -n 10 \
               "${LAST_TAG}..${CURRENT_COMMIT}"
           )"

           {
             printf 'Since %s there have been %s commit(s).\n\n' \
               "$LAST_TAG" "$NUM_COMMITS"
             printf 'The descriptions for the first (at most) 10 of these are as follows:\n\n'
             printf '%s\n' "$LAST_TEN_COMMITS"
           } > changelog.md
         else
           {
             printf 'Release %s\n\n' "$CURRENT_TAG"
             printf 'No preceding release tag was found in this repository history.\n'
           } > changelog.md
         fi

         cat changelog.md


    - uses: softprops/action-gh-release@v2
      if: github.event_name == 'release'
      with:
        files: VMsvga2-modern-*.zip
        # body_path: ./changelog.md

    - uses: actions/upload-artifact@v4
      with:
        name: VMsvga2-modern-${{ steps.vars.outputs.sha_short }}
        path: VMsvga2-modern-*.zip
